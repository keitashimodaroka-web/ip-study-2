<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知財検定2級 対策クイズ（学科編）</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; max-width: 700px; margin: 0 auto; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .question-num { font-weight: bold; color: #2c3e50; border-bottom: 2px solid #3498db; display: inline-block; margin-bottom: 10px; }
        .choice-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; text-align: left; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .choice-btn:hover { background-color: #ecf0f1; border-color: #3498db; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; font-weight: bold; }
        .incorrect { background-color: #f8d7da !important; border-color: #dc3545 !important; }
        .explanation { display: none; margin-top: 15px; padding: 15px; background: #e8f4fd; border-radius: 6px; font-size: 0.9em; border-left: 5px solid #3498db; }
        .stats { position: sticky; top: 0; background: #f4f7f6; padding: 10px; z-index: 100; font-weight: bold; text-align: center; border-bottom: 1px solid #ccc; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="stats" id="stats">現在の正解率: 0% (0/0)</div>
    <h1>知財検定2級 演習（第52回 学科）</h1>
    <div id="quiz-area"></div>

    <script>
        const quizData = [
            {
                id: "問1 (職務発明)",
                q: "職務発明に関して、最も適切と考えられるものはどれか。",
                choices: [
                    "ア 従業者が職務発明を完成した場合、当該従業者が特許を受ける権利を、その発生したときから有しないことがある。",
                    "イ 企業の取締役は、特許法に規定される「従業者等」に含まれない。",
                    "ウ 従業者が特許を受ける権利を会社に譲渡した場合、予め契約により定めのある場合に限り相当の利益を受ける。",
                    "エ 従業者が特許権を取得した場合、会社は実施の許諾を別途受ける必要がある。"
                ],
                answer: 0,
                explanation: "【正解: ア】 特許法33条の2。あらかじめ契約等で定めていれば、権利は発生時から会社に帰属します。イ：取締役も含まれます。ウ：契約がなくても法律上当然に利益を受ける権利があります。エ：会社には「通常実施権」が当然に発生します。"
            },
            {
                id: "問2 (公衆送信権)",
                q: "公衆送信権等に関して、最も不適切と考えられるものはどれか。",
                choices: [
                    "ア プログラムの著作物を同一構内における電気通信設備により送信することは、公衆送信に該当する。",
                    "イ 公衆送信には、放送、有線放送、自動公衆送信が含まれる。",
                    "ウ レコード製作者の送信可能化権の対象となるのは、商業用レコードのみである。",
                    "エ 複製権又は公衆送信権を有する者は、出版権を設定することができる。"
                ],
                answer: 0,
                explanation: "【正解: ア】 同一構内（イントラネット等）での送信は、原則として「公衆送信」から除外されます（著作権法2条1項7号の2）。"
            },
            {
                id: "問5 (特許権侵害)",
                q: "特許権の侵害に関して、最も適切と考えられるものはどれか。",
                choices: [
                    "ア 特許権者から購入した特許製品を第三者に転売する行為は、特許権の侵害となる。",
                    "イ 特許製品の問題点を解決するために試験として使用することは、特許権の侵害となる。",
                    "ウ 他人の特許発明を家庭内で製造して使用する行為は、特許権の侵害となる。",
                    "エ 他人の特許発明を利用した自己の特許発明を業として実施する場合は、その他人の特許権侵害となる。"
                ],
                answer: 3,
                explanation: "【正解: エ】 利用発明の関係（特許法72条）となり、たとえ自分の特許であっても他人の特許権を侵害します。ア：消尽の理論。イ：試験研究は免責。ウ：家庭内使用は侵害になりません。"
            }
        ];

        let score = 0; let answered = 0;
        function render() {
            const area = document.getElementById('quiz-area');
            quizData.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<div class="question-num">${item.id}</div><p>${item.q}</p>
                    <div id="choices-${idx}">${item.choices.map((c, i) => `<button class="choice-btn" onclick="check(${idx},${i})">${c}</button>`).join('')}</div>
                    <div id="exp-${idx}" class="explanation"></div>`;
                area.appendChild(div);
            });
        }
        function check(qIdx, cIdx) {
            const item = quizData[qIdx];
            const exp = document.getElementById(`exp-${qIdx}`);
            if (exp.style.display === 'block') return;
            const btns = document.getElementById(`choices-${qIdx}`).getElementsByTagName('button');
            if (cIdx === item.answer) { score++; btns[cIdx].classList.add('correct'); }
            else { btns[cIdx].classList.add('incorrect'); btns[item.answer].classList.add('correct'); }
            exp.innerText = item.explanation; exp.style.display = 'block';
            answered++; updateStats();
        }
        function updateStats() {
            document.getElementById('stats').innerText = `現在の正解率: ${Math.round((score/answered)*100)}% (${score}/${answered})`;
        }
        render();
    </script>
</body>
</html>
