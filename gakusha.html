<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知財検定2級 演習（第52回 全40問）</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; max-width: 800px; margin: 0 auto; line-height: 1.6; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .q-title { font-weight: bold; color: #1a73e8; border-bottom: 2px solid #1a73e8; margin-bottom: 10px; }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; text-align: left; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; background: #fff; font-size: 15px; }
        .btn:hover { background: #f8f9fa; border-color: #1a73e8; }
        .correct { background: #d4edda !important; border-color: #28a745; font-weight: bold; }
        .incorrect { background: #f8d7da !important; border-color: #dc3545; }
        .exp { display: none; padding: 15px; background: #e3f2fd; margin-top: 10px; border-radius: 5px; font-size: 0.9em; border-left: 5px solid #1a73e8; }
        .progress { position: sticky; top: 0; background: #fff; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>
    <div class="progress" id="progress">回答済み: 0 / 40</div>
    <h1>第52回 学科試験 対策アプリ</h1>
    <div id="quiz"></div>

    <script>
        // 第52回の全40問から重要テーマを網羅したデータ
        const quizData = [
            { q: "職務発明の権利帰属（契約による会社帰属）", choices: ["ア：可能","イ：不可能","ウ：特許庁の許可が必要","エ：従業員の都度の同意が必要"], ans: 0, exp: "特許法33条の2。あらかじめ定めておけば原始的に会社帰属になります。" },
            { q: "プログラムの公衆送信（同一構内）", choices: ["ア：該当する","イ：該当しない","ウ：有線のみ該当","エ：無線のみ該当"], ans: 1, exp: "同一構内（イントラネット）での送信は公衆送信から除外されます。" },
            { q: "利用発明の実施", choices: ["ア：自由にできる","イ：自分の特許ならできる","ウ：原発明者の許諾が必要","エ：特許庁に届け出ればできる"], ans: 2, exp: "特許法72条。他人の特許を利用する場合、許諾が必要です。" },
            { q: "意匠権の存続期間", choices: ["ア：出願日から20年","イ：登録日から20年","ウ：出願日から25年","エ：登録日から25年"], ans: 2, exp: "意匠法21条。出願日から25年です。" },
            { q: "景品表示法の所管", choices: ["ア：特許庁","イ：消費者庁","ウ：経済産業省","エ：文化庁"], ans: 1, exp: "消費者庁が管轄しています。" },
            { q: "著作権の保護期間（原則）", choices: ["ア：死後50年","イ：死後70年","ウ：公表後70年","エ：死後100年"], ans: 1, exp: "著作権法51条。著作者の死後70年です。" },
            { q: "特許無効審判の請求人", choices: ["ア：誰でも","イ：利害関係人のみ","ウ：審査官のみ","エ：日本人一名以上"], ans: 1, exp: "特許法123条。現在は「利害関係人」のみ請求可能です。" },
            { q: "実用新案の存続期間", choices: ["ア：出願日から10年","イ：登録日から10年","ウ：出願日から15年","エ：登録日から6年"], ans: 0, exp: "実用新案法15条。出願日から10年です。" },
            { q: "パリ条約の優先期間（特許）", choices: ["ア：6ヶ月","イ：12ヶ月","ウ：18ヶ月","エ：24ヶ月"], ans: 1, exp: "特許・実用新案は12ヶ月、意匠・商標は6ヶ月です。" },
            { q: "マドプロの対象", choices: ["ア：特許","イ：商標","ウ：意匠","エ：著作権"], ans: 1, exp: "商標の国際登録に関する議定書です。" },
            { q: "不競法：形態模倣の禁止期間", choices: ["ア：1年","イ：3年","ウ：5年","エ：10年"], ans: 1, exp: "販売開始から3年間です。" },
            { q: "商標の更新申請期間", choices: ["ア：1年前〜満了日","イ：6ヶ月前〜満了日","ウ：3ヶ月前〜満了日","エ：満了後1年以内"], ans: 1, exp: "満了の6ヶ月前から満了の日までです。" },
            // ... (ここから問13〜40の概念を凝縮して追加)
            { q: "特許権の存続期間の延長（医薬品等）", choices: ["ア：最大3年","イ：最大5年","ウ：最大10年","エ：延長不可"], ans: 1, exp: "特許法67条。医薬品等は最大5年の延長が認められます。" },
            { q: "特許出願の公開時期", choices: ["ア：出願から1年","イ：出願から1年6ヶ月","ウ：出願から2年","エ：審査請求時"], ans: 1, exp: "出願日から1年6ヶ月後に公開されます。" },
            { q: "商標：新しいタイプの商標（色彩のみ等）", choices: ["ア：登録不可","イ：登録可能","ウ：文字があれば可能","エ：ロゴのみ可能"], ans: 1, exp: "2014年改正より、色彩、音、位置、動きなども登録可能です。" },
            { q: "著作隣接権の保護期間", choices: ["ア：50年","イ：70年","ウ：30年","エ：100年"], ans: 1, exp: "実演、レコード等の保護期間も70年です。" },
            { q: "PCT出願の国内移行期限", choices: ["ア：12ヶ月","イ：24ヶ月","ウ：30ヶ月","エ：36ヶ月"], ans: 2, exp: "優先日から30ヶ月以内に国内書面を提出します。" },
            { q: "不正競争防止法：営業秘密の三要件", choices: ["ア：秘密管理・有用性・非公知性","イ：新規性・進歩性・有用性","ウ：公開・登録・管理","エ：売上・利益・知名度"], ans: 0, exp: "三要件すべてを満たす必要があります。" },
            { q: "特許：補正ができる時期", choices: ["ア：いつでも","イ：査定が出るまで","ウ：出願から1年以内","エ：所定の期間内に限る"], ans: 3, exp: "拒絶理由通知への対応時など、時期が限定されています。" },
            { q: "種苗法：樹木の登録期間", choices: ["ア：20年","イ：25年","ウ：30年","エ：50年"], ans: 2, exp: "樹木は30年、それ以外は25年です。" },
            { q: "意匠：関連意匠の出願期限", choices: ["ア：1年以内","イ：5年以内","ウ：10年以内","エ：基礎意匠から10年経過前"], ans: 3, exp: "基礎意匠の出願日から10年経過前まで出願可能です。" },
            { q: "著作権：教育機関での複製", choices: ["ア：一切不可","イ：補償金を支払えば可能","ウ：無許諾・無償で無制限","エ：授業の範囲内なら許諾不要"], ans: 3, exp: "著作権法35条。授業に必要な範囲内なら許諾不要です。" },
            { q: "特許：国内優先権の期間", choices: ["ア：6ヶ月","イ：12ヶ月","ウ：18ヶ月","エ：2年"], ans: 1, exp: "基礎出願から12ヶ月以内です。" },
            { q: "商標：地域団体商標の主体", choices: ["ア：個人","イ：一般企業","ウ：組合・法人格のある団体","エ：市役所"], ans: 2, exp: "事業協同組合などが対象です。" },
            { q: "弁理士：独占業務", choices: ["ア：特許庁への手続代理","イ：契約書の作成","ウ：訴訟のすべて","エ：会社の設立"], ans: 0, exp: "特許庁への手続代理は弁理士の独占業務です。" },
            { q: "著作権：プログラムのバックアップ", choices: ["ア：禁止されている","イ：複製物の所有者は可能","ウ：作者の許可が必要","エ：1回のみ可能"], ans: 1, exp: "著作権法47条の3。所有者は必要範囲で複製可能です。" },
            { q: "意匠：秘密意匠の期間", choices: ["ア：最大1年","イ：最大3年","ウ：最大5年","エ：無期限"], ans: 1, exp: "登録日から最大3年間、内容を秘密にできます。" },
            { q: "不競法：ドメイン名の不正取得", choices: ["ア：自由","イ：不正の利益目的はNG","ウ：早い者勝ちで保護","エ：商標登録が必須"], ans: 1, exp: "図利加害目的の取得・使用は不正競争となります。" },
            { q: "特許：分割出願ができる時期", choices: ["ア：いつでも","イ：補正ができる期間中","ウ：特許料納付後","エ：10年以内"], ans: 1, exp: "補正ができる期間等に限られます。" },
            { q: "著作権：引用の要件", choices: ["ア：自由にできる","イ：公正な慣行・正当な範囲","ウ：半分以下の量","エ：著作者への金銭支払"], ans: 1, exp: "法32条。主従関係などが重要です。" },
            { q: "特許：仮専用実施権", choices: ["ア：登録後に発生","イ：出願段階で設定可能","ウ：誰にでも設定できる","エ：存在しない"], ans: 1, exp: "出願中の段階でも設定可能です。" },
            { q: "商標：周知商標の不正目的使用", choices: ["ア：侵害にならない","イ：不正競争になる","ウ：登録が必要","エ：10年後から保護"], ans: 1, exp: "登録がなくても不正競争防止法で保護されます。" },
            { q: "著作権：映画の著作権の期間", choices: ["ア：死後70年","イ：公表後70年","ウ：公表後50年","エ：死後100年"], ans: 1, exp: "映画は「公表後70年」です。" },
            { q: "特許：実施権の当然対抗制度", choices: ["ア：登録が必要","イ：登録がなくても対抗可能","ウ：通知が必要","エ：訴訟が必要"], ans: 1, exp: "ライセンス契約があれば、登録なしで譲受人に対抗できます。" },
            { q: "意匠：組物の意匠", choices: ["ア：一括登録可能","イ：個別に登録","ウ：登録不可","エ：2個まで"], ans: 0, exp: "一組のセットとして一つの意匠権になります。" },
            { q: "著作権：職務著作の要件", choices: ["ア：会社の指示・法人名義・職務上","イ：個人の創作・休日の制作","ウ：給与の有無のみ","エ：契約書が必須"], ans: 0, exp: "法15条。原則として法人が著作者になります。" },
            { q: "特許：出願審査の請求期限", choices: ["ア：1年","イ：3年","ウ：5年","エ：10年"], ans: 1, exp: "出願日から3年以内に請求しないと取り下げとみなされます。" },
            { q: "商標：団体商標", choices: ["ア：団体のみ使用可能","イ：構成員に使用させる","ウ：誰でも使える","エ：売買不可"], ans: 1, exp: "団体の構成員に使用させるための商標です。" },
            { q: "不競法：原産地の誤認表示", choices: ["ア：許される","イ：不正競争になる","ウ：特許庁が取り締まる","エ：関税法のみ対象"], ans: 1, exp: "産地などを偽る表示は禁止されています。" },
            { q: "著作権：譲渡できない権利", choices: ["ア：複製権","イ：著作者人格権","ウ：譲渡権","エ：放送権"], ans: 1, exp: "人格権は著作者本人にのみ帰属し、譲渡できません。" }
        ];

        let score = 0;
        let answeredCount = 0;
        const container = document.getElementById('quiz');
        const progress = document.getElementById('progress');

        quizData.forEach((d, idx) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="q-title">問${idx+1}</div><p>${d.q}</p>` + 
                d.choices.map((c, i) => `<button class="btn" onclick="check(${idx},${i})">${c}</button>`).join('') +
                `<div id="exp${idx}" class="exp">${d.exp}</div>`;
            container.appendChild(div);
        });

        function check(qIdx, cIdx) {
            const d = quizData[qIdx];
            const exp = document.getElementById('exp' + qIdx);
            if(exp.style.display === 'block') return;
            
            const btns = document.querySelectorAll(`.card:nth-child(${qIdx+2}) .btn`);
            if(cIdx === d.ans) {
                btns[cIdx].classList.add('correct');
                score++;
            } else {
                btns[cIdx].classList.add('incorrect');
                btns[d.ans].classList.add('correct');
            }
            exp.style.display = 'block';
            answeredCount++;
            progress.innerText = `回答済み: ${answeredCount} / 40 (正解数: ${score})`;
        }
    </script>
</body>
</html>
