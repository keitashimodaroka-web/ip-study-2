<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知財検定2級 対策（第52回 学科 前半）</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .q-title { font-weight: bold; color: #1a73e8; border-bottom: 2px solid #1a73e8; margin-bottom: 10px; }
        .btn { display: block; width: 100%; padding: 10px; margin: 5px 0; text-align: left; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; background: #fff; }
        .btn:hover { background: #f8f9fa; }
        .correct { background: #d4edda !important; border-color: #28a745; }
        .incorrect { background: #f8d7da !important; border-color: #dc3545; }
        .exp { display: none; padding: 15px; background: #e3f2fd; margin-top: 10px; border-radius: 5px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>第52回 学科試験 (問1-問10抜粋版)</h1>
    <div id="quiz"></div>

    <script>
        const quizData = [
            { q: "職務発明で、あらかじめ契約等で定めれば特許を受ける権利を発生時から会社に帰属させることができるか？", choices: ["ア：できる","イ：できない","ウ：特許庁の許可が必要","エ：従業員の個別の同意が毎回必要"], ans: 0, exp: "【正解：ア】特許法33条の2。契約や勤務規則で定めておけば会社帰属にできます。" },
            { q: "同一構内（イントラネット）でのプログラム送信は「公衆送信」に該当するか？", choices: ["ア：該当する","イ：原則として該当しない","ウ：有線なら該当する","エ：無線なら該当する"], ans: 1, exp: "【正解：イ】同一構内での送信は公衆送信から除外されます。" },
            { q: "他人の特許発明を利用した自己の発明を業として実施する場合、その他人の特許権を侵害するか？", choices: ["ア：侵害しない","イ：自分の特許なら侵害にならない","ウ：侵害となる（利用発明）","エ：特許庁に届け出れば侵害にならない"], ans: 2, exp: "【正解：ウ】特許法72条。他人の発明を利用している場合、自分の特許であっても実施には相手の許諾が必要です。" },
            { q: "意匠権の存続期間は、出願日から何年か？", choices: ["ア：10年","イ：20年","ウ：25年","エ：50年"], ans: 2, exp: "【正解：ウ】2020年の法改正により、意匠権の存続期間は「出願日から25年」となりました。" },
            { q: "不当景品類及び不当表示防止法（景品表示法）の所管官庁はどこか？", choices: ["ア：特許庁","イ：文化庁","ウ：消費者庁","エ：経済産業省"], ans: 2, exp: "【正解：ウ】景品表示法は「消費者庁」が所管しています。" }
            // ※ここに追加の問題をどんどん増やせます
        ];

        const container = document.getElementById('quiz');
        quizData.forEach((d, idx) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="q-title">問${idx+1}</div><p>${d.q}</p>
                ${d.choices.map((c, i) => `<button class="btn" onclick="check(${idx},${i})">${c}</button>`).join('')}
                <div id="exp${idx}" class="exp">${d.exp}</div>`;
            container.appendChild(div);
        });

        function check(qIdx, cIdx) {
            const d = quizData[qIdx];
            const exp = document.getElementById('exp' + qIdx);
            if(exp.style.display === 'block') return;
            const btns = document.querySelectorAll(`.card:nth-child(${qIdx+1}) .btn`);
            if(cIdx === d.ans) { btns[cIdx].classList.add('correct'); }
            else { btns[cIdx].classList.add('incorrect'); btns[d.ans].classList.add('correct'); }
            exp.style.display = 'block';
        }
    </script>
</body>
</html>
